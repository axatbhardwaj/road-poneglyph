[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "logpose-launcher"
version = "0.1.19"
authors = [
    { name = "axatbhardwaj", email = "axatbhardwaj@gmail.com" },
]
description = "A Linux dedicated game server launcher for Palworld and ARK: Survival Evolved — manages steamcmd, systemd, and polkit on Debian/Ubuntu."
readme = "README.md"
license = "MIT"
requires-python = ">=3.8"
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: POSIX :: Linux",
]
dependencies = [
    "typer>=0.9,<0.21",
    "rich>=13.0,<14",
]

[project.scripts]
logpose = "logpose.main:app"

[tool.setuptools]
packages = ["logpose"]

[tool.setuptools.package-data]
"logpose" = ["templates/*"]
